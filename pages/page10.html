<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaitchPro - Page 10</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    /* Subtle green grid background */
    .section-wrapper {
      padding-top: 140px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      color: #fff;
      background-color: #071428;
      background-image:
        linear-gradient(rgba(0, 255, 0, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 0, 0.15) 1px, transparent 1px);
      background-size: 75px 75px;
    }

    .page-10-container {
      width: 90%; /* container width */
      max-width: 1200px; 
      display: flex;
      flex-direction: column;
      align-items: flex-start; /* align content slightly to left */
      gap: 20px;
      padding: 0 10px;
    }

    .page-10-text {
      width: 100%;
      max-width: 900px; /* text block width */
      text-align: left;  /* shift text slightly to left */
    }

    /* Title */
    .page-10-text h2 {
      font-size: 36px;
      margin-bottom: 15px;
    }

    /* Paragraph */
    .page-10-text p {
      font-size: 20px;
      line-height: 1.7;
      text-align: justify;
    }

    /* Image section */
    .page-10-image-box {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .page-10-image-box img {
      width: 70%;         
      max-width: 900px;
      border-radius: 14px;
      object-fit: cover;
    }

    /* Mobile responsiveness */
    @media (max-width: 900px) {
      .page-10-text h2 {
        font-size: 32px;
      }
      .page-10-text p {
        font-size: 18px;
      }
      .page-10-image-box img {
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <main class="section-wrapper">
    <section class="page-10-container">
      <div class="page-10-text">
        <h2 class="page-title">Achieve True Scalability</h2>
        <p class="page-description">
          Stop managing too many tools or people. Replace manual fulfillment and vendor chaos with automated, AI-driven workflows that cut costs, boost efficiency, and guarantee predictable results.
        </p>
      </div>

      <figure class="page-10-image-box">
        <img src="images/10.JPG" alt="Page 10 Image" class="page-image">
      </figure>
    </section>
  </main>

  <script src="../script.js"></script>
</body>
</html>
